name: CI
on:
  pull_request:
  push:
    branches:
      - main
concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}
permissions:
  contents: read
jobs:
  validate-just-module:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: taiki-e/install-action@325244bf19ca14a03711a3286971430941251f28 # just

      - name: Validate just module syntax
        run: |
          just --summary

      - name: Smoke test (dry-run)
        run: |
          just --dry-run repo submodule add kitsuyui/example

      - name: Lint shell scripts
        run: shellcheck scripts/repo/*.sh scripts/submodules/*.sh scripts/github/*.sh
