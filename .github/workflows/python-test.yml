name: Test
on:
  # pull-request events are not triggered when a PR is merged
  # push events are not triggered when a PR created from a fork repository
  # So we need both to run tests on every PR and after merging
  pull_request:
  push:
    branches:
      - main
concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.13", "3.14"]

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install just
        uses: taiki-e/install-action@bd8eb9d772de5ec8060dd69478b69dd23a39e725 # just

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: ${{ matrix.python }}

      - name: Enable caching
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Check Python version
        run: |
          actual_version=$(uv run python --version)
          expected_version="Python ${{ matrix.python }}"
          case "$actual_version" in
            "$expected_version"*) ;;
            *)
              echo "Expected $expected_version, but got $actual_version"
              exit 1
              ;;
          esac

      - name: Check formatting (ruff format)
        run: uv run ruff format --check .

      - name: Lint (ruff check)
        run: uv run ruff check .

      - name: Typecheck (mypy)
        run: just typecheck

      - name: Run tests
        run: just test

      - name: Record coverage
        run: just coverage-xml
