name: Happy Commit
on:
  pull_request:
permissions:
  contents: read
  pull-requests: write
  issues: write
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: kitsuyui/happy-commit@3e38265c6049c71a351c126da827c54dfaeaf1ee
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
