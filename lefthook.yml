# Clear Git hook environment variables before running checks so nested or sibling
# repositories are not affected: https://git-scm.com/docs/githooks
pre-commit:
  jobs:
    - name: typecheck
      run: for name in $(env | sed -n 's/^\(GIT_[A-Za-z0-9_]*\)=.*/\1/p'); do unset "$name"; done; just typecheck

pre-push:
  jobs:
    - name: typecheck
      run: for name in $(env | sed -n 's/^\(GIT_[A-Za-z0-9_]*\)=.*/\1/p'); do unset "$name"; done; just typecheck
    - name: test
      run: for name in $(env | sed -n 's/^\(GIT_[A-Za-z0-9_]*\)=.*/\1/p'); do unset "$name"; done; just test
